name: ci

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: alp
          POSTGRES_USER: alp
          POSTGRES_PASSWORD: alp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alp -d alp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      TEST_DATABASE_URL: postgresql://alp:alp@127.0.0.1:5432/alp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python package
        run: python -m pip install -e './python[dev]'
      - name: Run Python tests
        run: python -m pytest python/tests

  typescript:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: alp
          POSTGRES_USER: alp
          POSTGRES_PASSWORD: alp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alp -d alp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      TEST_DATABASE_URL: postgresql://alp:alp@127.0.0.1:5432/alp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: typescript/package-lock.json
      - name: Install TypeScript package
        working-directory: typescript
        run: npm install
      - name: Run TypeScript tests
        working-directory: typescript
        run: npm test
      - name: Build TypeScript package
        working-directory: typescript
        run: npm run build

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python package
        run: python -m pip install -e './python[dev]'
      - name: Generate development environment
        run: python scripts/generate_dev_keys.py
      - name: Run Docker Compose mock end-to-end smoke test
        run: bash scripts/e2e_mock.sh
